<!DOCTYPE html>

<head>

    <meta property="og:url" content="https://jayashbhandary.github.io/projects/dextr.html">

    <meta property="og:title" content="Dextr — Jayash Bhandary">

    <meta property="og:image" content="https://raw.githubusercontent.com/JayashBhandary/jayashbhandary.github.io/master/image.jpeg">
    <meta property="og:locale" content="en_US">

    <meta name="twitter:title" content="Dextr — Jayash Bhandary">

    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="apple-touch-icon" href="../favicon.ico">

    <link rel="stylesheet" href="../style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- GitHub-style Markdown rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
    <div data-component="nav"></div>

    <main>
        <header class="hero page-hero project-hero has-cover">
            <div class="container">
                <p class="hero-eyebrow"><a href="../pages/projects.html" class="breadcrumb"><i class="fas fa-arrow-left"></i> Projects</a></p>
                <div class="project-hero-grid">
                    <figure class="project-hero-media"><img src="../assets/img/dextr.png" alt="Dextr" loading="lazy"></figure>
                    <div class="project-hero-text">
                        <h1 class="hero-title">Dextr</h1>
                        <p class="hero-subtitle" id="project-lead">A cross-platform desktop client for SQL, NoSQL, object storage, and HTTP APIs — browse, edit, and query every data source side by side.</p>
                        <p class="project-meta"><span><i class="fas fa-tag"></i> SQLite, PostgreSQL, MongoDB, S3</span></p>
                        <div class="hero-actions"><a href="https://github.com/JayashBhandary/Dextr" class="btn btn-ghost" target="_blank" rel="noopener"><i class="fab fa-github"></i> View on GitHub</a></div>
                    </div>
                </div>
            </div>
        </header>

        <section class="section release-section" id="release-section" hidden>
            <div class="container">
                <div class="release-card" id="release-card">
                    <div class="release-head">
                        <div class="release-title">
                            <span class="release-label">Latest release</span>
                            <span class="release-tag" id="release-tag"></span>
                            <time class="release-date" id="release-date"></time>
                        </div>
                        <select class="release-select" id="release-select" aria-label="Select a release"></select>
                    </div>
                    <div class="markdown-body release-body" id="release-body"></div>
                    <ul class="release-assets" id="release-assets"></ul>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <article class="markdown-body" id="readme"><p class="readme-status">Loading README…</p></article>
            </div>
        </section>
    </main>

    <div data-component="footer"></div>

    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
    (function () {
        var cfg = {"owner":"JayashBhandary","name":"Dextr","branches":["main","master"],"title":"Dextr"};
        var el = document.getElementById('readme');
        var files = ['README.md', 'readme.md', 'Readme.md', 'README.markdown'];

        function rawBase(branch) {
            return 'https://raw.githubusercontent.com/' + cfg.owner + '/' + cfg.name + '/' + branch + '/';
        }
        function blobBase(branch) {
            return 'https://github.com/' + cfg.owner + '/' + cfg.name + '/blob/' + branch + '/';
        }
        function isAbsolute(u) { return /^(https?:|mailto:|tel:|data:|#|\/\/)/.test(u); }

        function render(md, branch) {
            marked.setOptions({ gfm: true, breaks: false });
            el.innerHTML = marked.parse(md);

            // Rewrite README-relative paths to GitHub.
            el.querySelectorAll('img[src]').forEach(function (img) {
                var s = img.getAttribute('src');
                if (s && !isAbsolute(s)) img.setAttribute('src', rawBase(branch) + s.replace(/^\.?\//, ''));
            });
            el.querySelectorAll('a[href]').forEach(function (a) {
                var h = a.getAttribute('href');
                if (h && !isAbsolute(h)) a.setAttribute('href', blobBase(branch) + h.replace(/^\.?\//, ''));
                if (a.hostname && a.hostname !== location.hostname) { a.target = '_blank'; a.rel = 'noopener'; }
            });

            // Syntax highlight + drop a duplicate leading title (the hero shows it).
            if (window.hljs) el.querySelectorAll('pre code').forEach(function (b) { hljs.highlightElement(b); });
            var h1 = el.querySelector('h1');
            if (h1 && h1.textContent.trim().toLowerCase() === cfg.title.toLowerCase()) h1.remove();

            // Fill the hero subtitle from the first paragraph if none was given.
            var lead = document.getElementById('project-lead');
            if (lead && !lead.textContent.trim()) {
                var p = el.querySelector('p');
                if (p) lead.textContent = p.textContent.trim().slice(0, 200);
            }
        }

        function attempt(bi, fi) {
            if (bi >= cfg.branches.length) {
                el.innerHTML = '<p class="readme-status">Couldn\'t load the README. ' +
                    '<a href="https://github.com/' + cfg.owner + '/' + cfg.name + '" target="_blank" rel="noopener">View it on GitHub</a>.</p>';
                return;
            }
            if (fi >= files.length) return attempt(bi + 1, 0);
            var branch = cfg.branches[bi];
            fetch(rawBase(branch) + files[fi])
                .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
                .then(function (md) { render(md, branch); })
                .catch(function () { attempt(bi, fi + 1); });
        }
        attempt(0, 0);
    })();

    // ---- GitHub releases: latest by default, selectable; graceful fallback ----
    (function () {
        var cfg = {"owner":"JayashBhandary","name":"Dextr","branches":["main","master"],"title":"Dextr"};
        var sec = document.getElementById('release-section');
        var tagEl = document.getElementById('release-tag');
        var dateEl = document.getElementById('release-date');
        var selEl = document.getElementById('release-select');
        var bodyEl = document.getElementById('release-body');
        var assetsEl = document.getElementById('release-assets');
        var releasesUrl = 'https://github.com/' + cfg.owner + '/' + cfg.name + '/releases';
        var api = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.name + '/releases?per_page=30';

        function fallback() {
            sec.hidden = false;
            sec.querySelector('.release-card').innerHTML =
                '<p class="readme-status">Latest release info is unavailable right now. ' +
                '<a href="' + releasesUrl + '" target="_blank" rel="noopener">View releases on GitHub</a>.</p>';
        }

        function fmtDate(s) {
            if (!s) return '';
            var d = new Date(s);
            if (isNaN(d)) return '';
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }
        function fmtSize(n) {
            if (!n && n !== 0) return '';
            var u = ['B', 'KB', 'MB', 'GB'], i = 0;
            while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
            return (i ? n.toFixed(1) : n) + ' ' + u[i];
        }

        function show(rel) {
            tagEl.textContent = rel.tag_name || rel.name || '';
            dateEl.textContent = fmtDate(rel.published_at);
            if (rel.published_at) dateEl.setAttribute('datetime', rel.published_at);
            bodyEl.innerHTML = rel.body
                ? marked.parse(rel.body)
                : '<p class="readme-status">No release notes.</p>';
            bodyEl.querySelectorAll('a[href]').forEach(function (a) {
                if (a.hostname && a.hostname !== location.hostname) { a.target = '_blank'; a.rel = 'noopener'; }
            });
            if (window.hljs) bodyEl.querySelectorAll('pre code').forEach(function (b) { hljs.highlightElement(b); });

            var assets = rel.assets || [];
            assetsEl.innerHTML = assets.map(function (a) {
                return '<li><a href="' + a.browser_download_url + '" rel="noopener">' +
                    '<i class="fas fa-download"></i> ' + a.name +
                    '</a><span class="asset-size">' + fmtSize(a.size) + '</span></li>';
            }).join('');
            assetsEl.hidden = !assets.length;
        }

        fetch(api, { headers: { 'Accept': 'application/vnd.github+json' } })
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function (list) {
                var rels = (list || []).filter(function (r) { return !r.draft; });
                if (!rels.length) return; // repo has no releases — leave the card hidden
                sec.hidden = false;
                rels.forEach(function (rel, i) {
                    var o = document.createElement('option');
                    o.value = String(i);
                    o.textContent = (rel.tag_name || rel.name || 'release') + (i === 0 ? ' — latest' : '');
                    selEl.appendChild(o);
                });
                selEl.addEventListener('change', function () { show(rels[+selEl.value] || rels[0]); });
                show(rels[0]);
            })
            .catch(fallback);
    })();
    </script>
</body>
</html>
